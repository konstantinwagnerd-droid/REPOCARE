name: Security Advisory (Pre-Triage)
description: Sicherheitslucke melden (oeffentlich unkritisch). Sensible Findings bitte per E-Mail!
title: "[Security]: "
labels: ["security", "triage", "private-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## WARNUNG
        Dieses Formular ist **nur** fuer Funde, deren Offenlegung kein Risiko
        darstellt (z. B. generische Haertungs-Vorschlaege, veraltete Doku,
        Info-Leaks ohne Exploit-Pfad).

        **Kritische Schwachstellen** (RCE, Auth-Bypass, Datenabfluss) bitte
        **AUSSCHLIESSLICH** per PGP-verschluesselter E-Mail an
        `security@careai.at` (Key auf Website) oder via GitHub Security
        Advisory (Private Vulnerability Reporting).

        Siehe `docs/SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Zusammenfassung
      description: Was ist die Schwachstelle? Keine Exploit-Details hier.
    validations: { required: true }
  - type: dropdown
    id: category
    attributes:
      label: Kategorie
      options:
        - Info-Leak (niedrig)
        - Missing Security Header
        - Veraltete Dependency (non-exploitable)
        - Rate-Limit / Brute-Force
        - Logging / Audit-Luecke
        - Konfigurations-Haertung
        - Andere (nicht kritisch)
    validations: { required: true }
  - type: dropdown
    id: severity
    attributes:
      label: Severity (CVSS-Selbsteinschaetzung)
      options:
        - None (0.0)
        - Low (0.1 – 3.9)
        - Medium (4.0 – 6.9)
        - High (7.0 – 8.9) — bitte privat melden!
        - Critical (9.0 – 10.0) — bitte privat melden!
    validations: { required: true }
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Was koennte ein Angreifer erreichen? (Keine Exploit-Steps.)
    validations: { required: true }
  - type: textarea
    id: mitigation
    attributes:
      label: Vorgeschlagene Mitigation
  - type: input
    id: reporter
    attributes:
      label: Melder (fuer Credit/CVE)
      placeholder: "Name / Handle / — falls anonym: 'anon'"
  - type: checkboxes
    id: disclosure
    attributes:
      label: Disclosure-Verpflichtung
      options:
        - label: "Ich habe das Finding nicht veroeffentlicht und werde 90 Tage Coordinated Disclosure einhalten"
          required: true
        - label: "Dieses Finding ist nicht ausnutzbar ohne weitere Informationen"
          required: true
