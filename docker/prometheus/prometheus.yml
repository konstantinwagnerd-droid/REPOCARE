global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: careai
    env: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Alertmanager optional; Konfiguration in docs/MONITORING.md

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: careai-app
    metrics_path: /api/metrics
    scheme: http
    bearer_token: ${METRICS_BEARER_TOKEN}
    static_configs:
      - targets: ["app:3000"]
        labels:
          service: careai-app

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
