apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: careai_readonly
    database: careai
    editable: false
    secureJsonData:
      password: ${POSTGRES_READONLY_PASSWORD}
    jsonData:
      sslmode: "disable"
      postgresVersion: 1600
      timescaledb: false
